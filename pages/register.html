<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account | Alpaca Farm</title>
  <meta name="description" content="Join the Alpaca Farm community. Create a free account to book tours, manage workshop registrations and shop our fiber goods."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=DM+Sans:wght@400;500;600&family=Lato:wght@400;700;900&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/css/style.css"/><link rel="stylesheet" href="../assets/css/dark-mode.css"/><link rel="stylesheet" href="../assets/css/rtl.css"/>
  <link rel="icon" type="image/png" href="../assets/images/favicon.png"/>
  <style>
    .pass-wrap{position:relative;}
    .pass-wrap input{padding-right:48px;}
    .pass-wrap .eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-light);cursor:pointer;font-size:1rem;display:flex;align-items:center;}
    .pass-wrap .eye-btn:hover{color:var(--color-primary);}
    .strength-bar-wrap{height:4px;background:var(--border-color);border-radius:2px;margin-top:6px;overflow:hidden;}
    #strength-bar{height:100%;width:0;border-radius:2px;transition:all 0.3s;}
    #strength-text{font-size:0.75rem;margin-top:3px;color:var(--text-light);}
  </style>
</head>
<body>

<!-- NO HEADER -->
<div class="auth-page-controls">
  <button class="control-btn" data-rtl-toggle aria-label="Toggle RTL">RTL</button>
  <button class="control-btn" data-theme-toggle aria-label="Toggle theme"><i class="ri-moon-line"></i></button>
</div>



<main class="auth-page" style="padding:var(--space-6) var(--space-3);" role="main">
  <div class="auth-card" style="max-width:460px;" role="region" aria-labelledby="reg-title">
    <!-- Brand -->
    <div class="auth-brand">
      <a href="../index.html" aria-label="Back to homepage">
        <div style="display:flex;flex-direction:row;align-items:center;justify-content:center;gap:12px;">
          <div class="logo-icon" style="width:48px;height:48px;font-size:1.3rem"><i class="ri-leaf-line"></i></div>
          <div class="brand-name" style="font-family:var(--font-heading);font-size:1.4rem;font-weight:700;color:var(--text-primary)">Alpaca Farm</div>
        </div>
      </a>
      <div>
        <h1 id="reg-title" style="font-size:1.6rem;margin-bottom:4px">Join the Flock</h1>
        <p style="font-size:0.875rem">Create your free member account today</p>
      </div>
    </div>

    <form id="register-form" data-validate novalidate aria-label="Registration form">
      <div class="form-group">
        <label for="reg-name">Full Name <span style="color:#e74c3c" aria-hidden="true">*</span></label>
        <input type="text" id="reg-name" class="form-control" placeholder="" data-rules="required" required autocomplete="name"/>
        <span class="form-error" role="alert"></span>
      </div>
      <div class="form-group">
        <label for="reg-email">Email Address <span style="color:#e74c3c" aria-hidden="true">*</span></label>
        <input type="email" id="reg-email" class="form-control" placeholder="" data-rules="required,email" required autocomplete="email"/>
        <span class="form-error" role="alert"></span>
      </div>
      <div class="form-group">
        <label for="reg-password">Password <span style="color:#e74c3c" aria-hidden="true">*</span></label>
        <div class="pass-wrap">
          <input type="password" id="reg-password" class="form-control" placeholder="Create a strong password" data-rules="required,password" required autocomplete="new-password"/>
          <button type="button" class="eye-btn" id="toggle-reg" aria-label="Show/hide password"><i class="ri-eye-line"></i></button>
        </div>
       
        <span class="form-error" role="alert"></span>
      </div>
      <div class="form-group">
        <label for="reg-confirm">Confirm Password <span style="color:#e74c3c" aria-hidden="true">*</span></label>
        <div class="pass-wrap">
          <input type="password" id="reg-confirm" class="form-control" placeholder="Repeat your password" data-rules="required" required autocomplete="new-password"/>
          <button type="button" class="eye-btn" id="toggle-confirm" aria-label="Show/hide confirm password"><i class="ri-eye-line"></i></button>
        </div>
        <span class="form-error" role="alert"></span>
      </div>

      <!-- Mandatory Terms -->
      <div class="checkbox-group" style="margin-bottom:8px">
        <input type="checkbox" id="terms" required aria-required="true"/>
        <label for="terms">I agree to the <a href="#" target="_blank">Terms of Service</a> and <a href="#" target="_blank">Privacy Policy</a> <span style="color:#e74c3c" aria-hidden="true">*</span></label>
      </div>
      <div class="checkbox-group" style="margin-bottom:var(--space-3)">
        <input type="checkbox" id="nl-opt"/>
        <label for="nl-opt">Send me farm updates, new workshop announcements and exclusive offers</label>
      </div>

      <button type="submit" class="btn btn-primary btn-full"><i class="ri-user-add-line"></i> Create Account</button>
    </form>

    <div class="auth-divider"><span>or sign up with</span></div>

    <button class="oauth-btn" type="button" aria-label="Continue with Google">
      <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <button class="oauth-btn" type="button" aria-label="Continue with Apple">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701"/></svg>
      Continue with Apple
    </button>

    <p class="auth-footer-text">Already have an account? <a href="login.html">Sign in</a></p>
  </div>
</main>

<script src="../assets/js/main.js"></script>
<script>
  [['toggle-reg','reg-password'],['toggle-confirm','reg-confirm']].forEach(([id,inp])=>{
    const b=document.getElementById(id),i=document.getElementById(inp);
    b?.addEventListener('click',()=>{const t=i.type==='text';i.type=t?'password':'text';b.querySelector('i').className=t?'ri-eye-line':'ri-eye-off-line';});
  });
</script>
</body></html>
